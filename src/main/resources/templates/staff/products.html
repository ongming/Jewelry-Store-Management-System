<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm nhân viên</title>
    <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/catalog.css}">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{fragments/header :: managementSidebar('staff-products')}"></aside>

    <main class="admin-main">
        <header th:replace="~{fragments/header :: managementTopbar('Danh sách sản phẩm')}"></header>

        <section class="catalog-panel">
            <div class="catalog-panel__top">
                <h2>Sản phẩm (chỉ xem)</h2>
            </div>

            <table>
                <thead>
                <tr>
                    <th>Mã sản phẩm</th>
                    <th>Tên sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Giá</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.productCode}">SP001</td>
                    <td th:text="${product.productName}">Nhẫn vàng</td>
                    <td th:text="${product.category != null ? product.category.categoryName : 'Chưa phân loại'}">Nhẫn</td>
                    <td th:text="${#numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
