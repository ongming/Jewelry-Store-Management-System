<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý kho</title>
    <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/catalog.css}">
</head>
<body>
    <div class="admin-layout">
        <aside th:replace="~{fragments/header :: managementSidebar('staff-inventory')}"></aside>
        <main class="admin-main">
            <header th:replace="~{fragments/header :: managementTopbar('Quản lý kho')}"></header>
            <section class="catalog-panel">
                <div class="catalog-panel__top">
                    <h2>Danh sách tồn kho sản phẩm</h2>
                    <a class="btn btn-primary" th:href="@{/staff/inventory/import/new}">+ Nhập hàng</a>
                </div>
                <p class="alert success" th:if="${success}" th:text="${success}"></p>
                <p class="alert error" th:if="${error}" th:text="${error}"></p>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hình ảnh</th>
                            <th>Mã</th>
                            <th>Tên sản phẩm</th>
                            <th>Tồn kho</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.productId}"></td>
                            <td>
                                <img class="product-thumb" 
                                     th:src="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl) ? product.imageUrl : 'https://placehold.co/80x80?text=No+Image'}" 
                                     alt="product image">
                            </td>
                            <td th:text="${product.productCode}"></td>
                            <td th:text="${product.productName}"></td>
                            <td th:text="${product.inventory != null ? product.inventory.quantityStock : 0}"></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>
