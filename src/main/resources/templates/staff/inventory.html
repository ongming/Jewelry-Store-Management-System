<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý kho</title>
    <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/catalog.css}">
</head>
<body>
    <div class="admin-layout">
        <aside th:replace="~{fragments/header :: managementSidebar('staff-inventory')}"></aside>
        <main class="admin-main">
            <header th:replace="~{fragments/header :: managementTopbar('Quản lý kho')}"></header>
            <section class="catalog-panel">
                <div class="catalog-panel__top">
                    <h2>Danh sách tồn kho sản phẩm</h2>
                    <a class="btn btn-primary" th:href="@{/staff/inventory/import/new}">+ Nhập hàng</a>
                </div>
                <p class="alert success" th:if="${success}" th:text="${success}"></p>
                <p class="alert error" th:if="${error}" th:text="${error}"></p>

                <!-- [OBSERVER PATTERN] Hiển thị cảnh báo tồn kho thấp từ LowStockAlertListener -->
                <div th:if="${lowStockAlerts != null and !lowStockAlerts.isEmpty()}"
                     style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px; margin-bottom: 20px;">
                    <h3 style="color: #856404; margin: 0 0 12px 0; font-size: 16px;">
                        ⚠️ Cảnh báo từ Observer - Tồn kho thấp (<span th:text="${lowStockAlerts.size()}"></span> cảnh báo)
                    </h3>
                    <div th:each="alert : ${lowStockAlerts}"
                         style="background: #fff8e1; padding: 10px 14px; margin-bottom: 6px; border-radius: 6px; border-left: 4px solid #ff9800; font-size: 14px;">
                        <span th:text="${alert.message}"></span>
                        <span style="color: #999; font-size: 12px; margin-left: 8px;"
                              th:text="${alert.formattedTime}"></span>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hình ảnh</th>
                            <th>Mã</th>
                            <th>Tên sản phẩm</th>
                            <th>Tồn kho</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.productId}"></td>
                            <td>
                                <img class="product-thumb" 
                                     th:src="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl) ? product.imageUrl : 'https://placehold.co/80x80?text=No+Image'}" 
                                     alt="product image">
                            </td>
                            <td th:text="${product.productCode}"></td>
                            <td th:text="${product.productName}"></td>
                            <td th:text="${product.inventory != null ? product.inventory.quantityStock : 0}"></td>
                            <td>
                                <!-- Hiển thị trạng thái tồn kho -->
                                <span th:if="${product.inventory == null or product.inventory.quantityStock == 0}"
                                      style="background: #dc3545; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">
                                    Hết hàng
                                </span>
                                <span th:if="${product.inventory != null and product.inventory.quantityStock > 0 and product.inventory.quantityStock < lowStockThreshold}"
                                      style="background: #ff9800; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">
                                    ⚠ Tồn kho thấp
                                </span>
                                <span th:if="${product.inventory != null and product.inventory.quantityStock >= lowStockThreshold}"
                                      style="background: #28a745; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">
                                    Đủ hàng
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>
