<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng trang sức | Sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/guest/common.css}">
    <link rel="stylesheet" th:href="@{/css/guest/products.css}">
</head>
<body>
<div th:replace="~{fragments/header :: guestHeader}"></div>

<section class="container section-space">
    <div class="section-title">
        <p>Bộ sưu tập</p>
        <h1>Sản phẩm cao cấp</h1>
    </div>

    <div class="products-layout">
        <aside class="filter-panel">
            <h3>Bộ lọc</h3>
            <form th:action="@{/guest/products}" method="get">
                <label for="category">Danh mục</label>
                <select id="category" name="category">
                    <option value="">Tất cả</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                            th:selected="${selectedCategory == cat}"></option>
                </select>

                <label for="minPrice">Giá từ</label>
                <input id="minPrice" name="minPrice" type="number" placeholder="5000000" th:value="${minPrice}">

                <label for="maxPrice">Giá đến</label>
                <input id="maxPrice" name="maxPrice" type="number" placeholder="15000000" th:value="${maxPrice}">

                <label for="sort">Sắp xếp</label>
                <select id="sort" name="sort">
                    <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá tăng dần</option>
                    <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá giảm dần</option>
                </select>

                <button type="submit" class="btn-gold">Áp dụng</button>
            </form>
        </aside>

        <div class="product-grid">
            <article class="product-card" th:each="item : ${products}">
                <img th:src="${item.imageUrl}" th:alt="${item.productName}">
                <div class="product-card-content">
                    <small th:text="${item.category}">Nhẫn</small>
                    <h3 th:text="${item.productName}">Tên sản phẩm</h3>
                    <a th:href="@{/guest/product-detail/{id}(id=${item.id})}">Xem chi tiết</a>
                </div>
            </article>
        </div>

        <p class="empty-state" th:if="${#lists.isEmpty(products)}">Không có kết quả phù hợp với bộ lọc hiện tại.</p>

        <div class="pagination" th:if="${totalPages > 1}">
            <a th:if="${hasPrev}"
               th:href="@{/guest/products(category=${selectedCategory},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort},page=${currentPage - 1})}">
                Trang trước
            </a>
            <span th:each="item : ${pageItems}">
                <span class="dots" th:if="${item.ellipsis}">...</span>
                <a th:if="${!item.ellipsis}"
                   th:href="@{/guest/products(category=${selectedCategory},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort},page=${item.page})}"
                   th:classappend="${item.active} ? 'active-page' : ''"
                   th:text="${item.page}">1</a>
            </span>
            <a th:if="${hasNext}"
               th:href="@{/guest/products(category=${selectedCategory},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort},page=${currentPage + 1})}">
                Trang sau
            </a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: guestFooter}"></div>
</body>
</html>
